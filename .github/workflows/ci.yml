name: CI

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

# The caller must grant every permission the called workflow's jobs request.
permissions:
  contents: read

jobs:
  swift:
    uses: agoodkind/swift-makefile/.github/workflows/_ci.yml@main
    with:
      runner: macos-26
      fetch-depth: "0"
      # The vendored wireguard-apple WireGuardKitGo target builds a Go c-archive
      # (libwg-go.a) through its own Makefile, whose goroot prepare step fails
      # unless `go env GOROOT` resolves. The macos-26 runner does not put Go on the
      # build PATH, so install it through brew; the WireGuardKitGo Makefile already
      # adds /opt/homebrew/bin to PATH, which is where brew installs go. The shared
      # required jobs and the signed macOS build all link WireGuardKitGo.
      brew-packages: go
      # Import the Apple Distribution certificate into the runner keychain and hand
      # its SHA-1 to swift-mk as CODE_SIGN_IDENTITY. swift-mk builds the signing
      # xcconfig (the identity + Manual style + team) and exports XCODE_XCCONFIG_FILE
      # so it wins over every target. The macOS agent and tunnel provider use the
      # app-extension NetworkExtension entitlement (packet-tunnel-provider), which
      # Developer ID cannot authorize on macOS; App Store distribution profiles do,
      # and they enumerate no devices, so the build signs on an unregistered runner.
      import-signing-cert: true
      signing-identity-name: "Apple Distribution: Alex Goodkind (H3BMXM4W7H)"
      apple-team-id: H3BMXM4W7H
      # The agent and tunnel-provider targets carry App Groups + Network Extensions
      # entitlements, so each needs its own provisioning profile. Two Mac App Store
      # provisioning profiles are installed from the newline-separated
      # APPLE_DEVELOPER_ID_PROFILE_BASE64 secret; Project.swift maps each NE target to
      # its profile by name when the engine signals provisioning (a non-empty
      # PROVISIONING_PROFILE_SPECIFIER), so local builds that install no profile are
      # unaffected.
      install-provisioning-profile: true
      # Build the macOS agent + provider only. CODE_SIGN_IDENTITY and
      # CODE_SIGN_STYLE are deliberately NOT set here: setting them in make-args
      # would beat swift-mk's Developer ID override and force the failing
      # development signing, the exact bug in the prior CI. The shared required
      # jobs still compile-check the unsigned iOS simulator and Mac Catalyst slices;
      # the iOS device build needs an archive/App-Store flow and belongs at release.
      make-args: "TARGET=mac"
    secrets: inherit
