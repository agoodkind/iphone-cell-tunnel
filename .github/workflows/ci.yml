name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches-ignore:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# The caller must grant every permission the called workflow's jobs request.
permissions:
  contents: read

jobs:
  swift:
    uses: agoodkind/swift-makefile/.github/workflows/_ci.yml@main
    with:
      runner: macos-26
      fetch-depth: "0"
      # The vendored wireguard-apple WireGuardKitGo target builds a Go c-archive
      # (libwg-go.a) through its own Makefile, whose goroot prepare step fails
      # unless `go env GOROOT` resolves. The macos-26 runner does not put Go on the
      # build PATH, so install it through brew; the WireGuardKitGo Makefile already
      # adds /opt/homebrew/bin to PATH, which is where brew installs go. Both the
      # gate (dead-code coverage build) and the build target link WireGuardKitGo.
      brew-packages: go
      # gate (lint/audit/deadcode) runs in the reusable workflow's mandatory gate
      # job; its dead-code coverage build compiles mac, mac-catalyst, and the iOS
      # simulator unsigned, so those three are compile-checked on every PR. The
      # build matrix target below produces the signed macOS product.
      targets: '["build","test"]'
      # Import the Developer ID Application certificate (with its private key) into
      # the runner keychain so codesign and automatic signing can use it. The action
      # also resolves the cert SHA-1, which the reusable workflow exports as
      # CODE_SIGN_IDENTITY; swift-mk would infer CODE_SIGN_STYLE=Manual from that
      # named identity, but Manual disables -allowProvisioningUpdates, and the two
      # macOS NetworkExtension targets (App Groups + Network Extensions entitlements)
      # need a provisioning profile even under Developer ID. So the consumer Makefile
      # exports SWIFT_MK_SIGN_IDENTITY="Developer ID Application" + SWIFT_MK_SIGN_STYLE
      # =Automatic for the macOS NE targets whenever the App Store Connect API key is
      # present; those win over the SHA-1 inside swift-mk's signing-xcconfig prelude,
      # so the override is automatic Developer ID and Xcode downloads the two minted
      # Developer ID (MAC_APP_DIRECT) profiles via -allowProvisioningUpdates.
      import-signing-cert: true
      signing-identity-name: "Developer ID Application: Alex Goodkind (H3BMXM4W7H)"
      apple-team-id: H3BMXM4W7H
      # Build the macOS agent + provider only. The APPLE_NOTARY_* secrets flow in via
      # secrets: inherit and feed the dev tool's -allowProvisioningUpdates +
      # -authenticationKey* args, so Xcode auto-provisions on the ephemeral runner.
      # The iOS simulator and Mac Catalyst slices are compile-checked unsigned by the
      # mandatory gate job; the iOS device build needs an archive/App-Store flow and
      # belongs at release.
      make-args: "TARGET=mac"
    secrets: inherit
