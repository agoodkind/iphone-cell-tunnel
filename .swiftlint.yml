included:
  - Apps
  - Sources
  - Tests
  - Tools
  - Package.swift
  - Project.swift
  - Tuist.swift
  - Tuist/Package.swift

excluded:
  - build
  - Products
  - Derived
  - DerivedData
  - Sources/CellTunnelCore/Generated
  - CellTunnel.xcodeproj
  - CellTunnel.xcworkspace
  - Tuist/.build
  - .build
  - Tools/.build

opt_in_rules:
  - all

analyzer_rules:
  - all

disabled_rules:
  - accessibility_label_for_image
  - accessibility_trait_for_button
  - attributes
  - conditional_returns_on_newline
  - contrasted_opening_brace
  - discouraged_optional_collection
  - explicit_acl
  - explicit_enum_raw_value
  - explicit_self
  - explicit_top_level_acl
  - explicit_type_interface
  - file_header
  - file_name
  - file_types_order
  - indentation_width
  - legacy_objc_type
  - missing_docs
  - multiline_arguments_brackets
  - multiline_literal_brackets
  - multiline_parameters_brackets
  - no_grouping_extension
  - no_magic_numbers
  - pattern_matching_keywords
  - one_declaration_per_file
  - prefer_self_in_static_references
  - prefer_nimble
  - prefixed_toplevel_constant
  - required_deinit
  - sorted_imports
  - sorted_enum_cases
  - switch_case_on_newline
  - trailing_comma
  - type_contents_order
  - vertical_whitespace_between_cases
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

custom_rules:
  no_direct_runtime_output:
    included: "^(Apps|Sources)/.*\\.swift$"
    regex: "\\b(print|debugPrint|dump|NSLog|os_log)\\s*\\("
    message: "Use CellTunnelLog instead of direct runtime output."
    severity: error
  no_direct_runtime_logger:
    included: "^(Apps|Sources)/(?!CellTunnelLog/).*\\.swift$"
    regex: "\\bLogger\\s*\\("
    message: "Construct runtime loggers through CellTunnelLog."
    severity: error
  no_runtime_lint_disables:
    included: "^(Apps|Sources)/.*\\.swift$"
    regex: "swiftlint:disable"
    message: "Do not disable SwiftLint in runtime Swift code."
    severity: error
  no_logger_warning_level:
    included: "^(Apps|Sources)/.*\\.swift$"
    regex: "\\.warning\\s*\\("
    message: "Use notice for recoverable events or error for failures."
    severity: error

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_interpolated_strings: true
  ignores_urls: true

file_length:
  warning: 500
  error: 900
  ignore_comment_only_lines: true

type_body_length:
  warning: 350
  error: 600

function_body_length:
  warning: 70
  error: 120

closure_body_length:
  warning: 60
  error: 120

cyclomatic_complexity:
  warning: 12
  error: 20
  ignores_case_statements: true

function_parameter_count:
  warning: 6
  error: 8

identifier_name:
  min_length:
    warning: 2
    error: 1
  excluded:
    - id
    - x
    - y
    - z

large_tuple:
  warning: 3
  error: 4

nesting:
  type_level:
    warning: 2
  function_level:
    warning: 4

reporter: xcode
